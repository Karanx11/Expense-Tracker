name: expense_tracker
description: "Smart expense tracking Flutter application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.6.0
  shared_preferences: ^2.5.4
  socket_io_client: ^3.1.4
  intl: ^0.20.2

  # Charts
  fl_chart: ^0.66.0

  # SMS Reading
  telephony_fix: ^0.2.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # App icon generator
  flutter_launcher_icons: ^0.14.4


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


# App icon configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "lib/assets/logo.png"


flutter:
  uses-material-design: true

  assets:
    - lib/assets/logo.png